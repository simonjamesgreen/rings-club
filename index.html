<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Rings Club 🏆</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080810; --card: #12121e; --card2: #1a1a2e; --border: #2a2a3e;
      --pink: #FF0050; --green: #91FF00; --blue: #00FFF0; --yellow: #FFD700;
      --text: #ffffff; --muted: #7a7a9a; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    .container { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
    input, select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 10px; font-family: inherit; }
    input:focus, select:focus { border-color: var(--blue); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--card2); }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .btn { display: inline-block; padding: 12px 20px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; text-align: center; width: 100%; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--pink); color: white; }
    .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-green { background: var(--green); color: #000; }
    .btn-blue { background: var(--blue); color: #000; }
    .btn-sm { padding: 7px 14px; font-size: 13px; width: auto; }
    .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
    .tab.active { color: var(--pink); border-bottom-color: var(--pink); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .auth-hero { text-align: center; padding: 48px 24px 32px; }
    .auth-hero h1 { font-size: 40px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
    .auth-hero p { color: var(--muted); font-size: 15px; line-height: 1.5; }
    .rings-display { display: flex; justify-content: center; gap: 12px; margin: 24px 0; }
    .ring-circle { width: 54px; height: 54px; border-radius: 50%; border: 5px solid; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; }
    .ring-move { border-color: var(--pink); color: var(--pink); }
    .ring-exercise { border-color: var(--green); color: var(--green); }
    .ring-stand { border-color: var(--blue); color: var(--blue); }
    .auth-tabs { display: flex; background: var(--card2); border-radius: 8px; padding: 3px; margin-bottom: 20px; }
    .auth-tab { flex: 1; padding: 9px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: all 0.2s; }
    .auth-tab.active { background: var(--pink); color: white; }
    .leaderboard-row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .leaderboard-row:last-child { border-bottom: none; }
    .rank { font-size: 18px; font-weight: 800; width: 32px; text-align: center; flex-shrink: 0; }
    .rank-1 { color: var(--yellow); } .rank-2 { color: #C0C0C0; } .rank-3 { color: #CD7F32; }
    .player-name { flex: 1; font-size: 15px; font-weight: 600; }
    .player-score { font-size: 16px; font-weight: 700; color: var(--green); }
    .you-badge { font-size: 10px; font-weight: 700; background: var(--pink); color: white; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .powerup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .powerup-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
    .powerup-emoji { font-size: 28px; margin-bottom: 6px; }
    .powerup-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .powerup-desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
    .powerup-count { font-size: 22px; font-weight: 800; color: var(--yellow); margin-bottom: 8px; }
    .log-row { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
    .log-row:last-child { border-bottom: none; }
    .log-date { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .toggle-group { display: flex; gap: 8px; margin-bottom: 10px; }
    .toggle-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--border); background: var(--card2); color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .toggle-btn.active-yes { border-color: var(--green); color: var(--green); background: rgba(145,255,0,0.1); }
    .toggle-btn.active-no { border-color: var(--pink); color: var(--pink); background: rgba(255,0,80,0.1); }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; line-height: 1.4; }
    .alert-error { background: rgba(255,0,80,0.15); color: var(--pink); border: 1px solid rgba(255,0,80,0.3); }
    .alert-success { background: rgba(145,255,0,0.15); color: var(--green); border: 1px solid rgba(145,255,0,0.3); }
    .alert-info { background: rgba(0,255,240,0.1); color: var(--blue); border: 1px solid rgba(0,255,240,0.3); }
    .score-preview { background: var(--card2); border-radius: 10px; padding: 16px; text-align: center; margin: 12px 0; }
    .score-preview-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .score-big { font-size: 40px; font-weight: 900; letter-spacing: -1px; }
    .score-big.good { color: var(--green); } .score-big.zero { color: var(--pink); }
    .section-title { font-size: 18px; font-weight: 800; }
    .invite-code { font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--blue); text-align: center; padding: 16px; background: var(--card2); border-radius: 8px; margin: 12px 0; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; justify-content: center; padding: 40px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .league-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: var(--card2); border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); transition: border-color 0.2s; }
    .league-item:hover { border-color: var(--blue); }
    .league-item-name { font-size: 16px; font-weight: 700; }
    .league-item-dates { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .divider { text-align: center; color: var(--muted); font-size: 13px; margin: 16px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .text-muted { color: var(--muted); } .text-sm { font-size: 13px; } .text-center { text-align: center; }
    .bold { font-weight: 700; } .mb-8 { margin-bottom: 8px; } .mb-16 { margin-bottom: 16px; }
    .row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="screen-auth" class="screen active">
  <div class="auth-hero">
    <h1><span style="color:var(--pink)">Rings</span> <span style="color:var(--green)">Club</span></h1>
    <p>Close your rings. Crush your friends.<br>Mario Kart chaos included.</p>
    <div class="rings-display">
      <div class="ring-circle ring-move">M</div>
      <div class="ring-circle ring-exercise">E</div>
      <div class="ring-circle ring-stand">S</div>
    </div>
  </div>
  <div class="container">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Log In</div>
      <div class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div>
    </div>
    <div id="auth-msg"></div>
    <div id="auth-login">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
      <div style="height:8px"></div>
      <button class="btn btn-primary" onclick="handleLogin()">Log In</button>
      <span class="forgot-link" onclick="showScreen('forgot')">Forgot password?</span>
    </div>
    <div id="auth-signup" style="display:none">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="At least 6 characters">
      <label>Confirm Password</label>
      <input type="password" id="signup-confirm" placeholder="••••••••">
      <div style="height:8px"></div>
      <button class="btn btn-primary" onclick="handleSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- USERNAME SETUP -->
<div id="screen-username" class="screen">
  <div class="container" style="padding-top:60px">
    <div class="text-center mb-16">
      <div style="font-size:48px;margin-bottom:16px">👤</div>
      <h2 style="font-size:24px;font-weight:800;margin-bottom:8px">Pick your name</h2>
      <p class="text-muted">How you'll appear on the leaderboard</p>
    </div>
    <div id="username-msg"></div>
    <label>Username</label>
    <input type="text" id="username-input" placeholder="e.g. simongreen" maxlength="20">
    <div style="height:8px"></div>
    <button class="btn btn-primary" onclick="handleSetUsername()">Let's Go 🚀</button>
  </div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="header">
    <div class="logo"><span style="color:var(--pink)">Rings</span> <span style="color:var(--green)">Club</span></div>
    <button class="btn btn-secondary btn-sm" style="width:auto" onclick="handleSignOut()">Sign Out</button>
  </div>
  <div class="container">
    <div id="home-leagues"></div>
    <div class="divider">or</div>
    <div class="card">
      <div class="card-title">Create a League</div>
      <label>League Name</label>
      <input type="text" id="create-name" placeholder="e.g. The Ring Crew">
      <label>Start Date</label>
      <input type="date" id="create-start">
      <label>End Date</label>
      <input type="date" id="create-end">
      <div id="create-msg"></div>
      <button class="btn btn-green" onclick="handleCreateLeague()">Create League 🏁</button>
    </div>
    <div class="card">
      <div class="card-title">Join a League</div>
      <label>Invite Code</label>
      <input type="text" id="join-code" placeholder="XXXXXX" maxlength="6" autocorrect="off" autocapitalize="characters" style="text-transform:uppercase;letter-spacing:4px;font-size:20px;font-weight:800">
      <div id="join-msg"></div>
      <button class="btn btn-blue" onclick="handleJoinLeague()">Join →</button>
    </div>
  </div>
</div>

<!-- LEAGUE -->
<div id="screen-league" class="screen">
  <div class="header">
    <button class="btn btn-secondary btn-sm" style="width:auto" onclick="goHome()">← Back</button>
    <div id="league-title" style="font-weight:800;font-size:16px"></div>
    <div id="league-days" class="text-muted text-sm"></div>
  </div>
  <div class="tabs" id="league-tabs">
    <button class="tab active" onclick="switchTab('leaderboard')">🏆 Standings</button>
    <button class="tab" onclick="switchTab('submit')">📊 Log Day</button>
    <button class="tab" onclick="switchTab('powerups')">🎮 Power-Ups</button>
    <button class="tab" onclick="switchTab('log')">⚔️ Attacks</button>
    <button class="tab" onclick="switchTab('info')">ℹ️ Info</button>
  </div>
  <div id="tab-leaderboard" class="tab-content active"><div class="container"><div id="leaderboard-content"><div class="loading"><div class="spinner"></div></div></div></div></div>
  <div id="tab-submit" class="tab-content"><div class="container"><div id="submit-content"><div class="loading"><div class="spinner"></div></div></div></div></div>
  <div id="tab-powerups" class="tab-content"><div class="container"><div id="powerups-content"><div class="loading"><div class="spinner"></div></div></div></div></div>
  <div id="tab-log" class="tab-content"><div class="container"><div id="log-content"><div class="loading"><div class="spinner"></div></div></div></div></div>
  <div id="tab-info" class="tab-content"><div class="container"><div id="info-content"><div class="loading"><div class="spinner"></div></div></div></div></div>
  <div id="tab-admin" class="tab-content"><div class="container"><div id="admin-content"><div class="loading"><div class="spinner"></div></div></div></div></div>
</div>

<script>
const SUPABASE_URL = 'https://uvvtdqltmdzbwchbtvbj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2dnRkcWx0bWR6YndjaGJ0dmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTc1NDgsImV4cCI6MjA5MTk5MzU0OH0.qMHaphQXBRIZ2eZgyYFNEgRszRRM4V5jRSy3kPzLi5c';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, currentProfile = null, currentLeague = null, currentMembers = [];

// ── INIT ──────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) { currentUser = session.user; await loadProfile(); }
  else showScreen('auth');

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') { currentUser = session.user; await loadProfile(); }
    else if (event === 'SIGNED_OUT') { currentUser = null; currentProfile = null; currentLeague = null; showScreen('auth'); }
  });
}

// ── AUTH ──────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
  document.getElementById('auth-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('auth-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('auth-msg').innerHTML = '';
}

async function handleLogin() {
  const email = v('login-email'), password = v('login-password');
  if (!email || !password) return msg('auth-msg', 'Fill in all fields', 'error');
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) msg('auth-msg', error.message, 'error');
}

async function handleSignup() {
  const email = v('signup-email'), password = v('signup-password'), confirm = v('signup-confirm');
  if (!email || !password) return msg('auth-msg', 'Fill in all fields', 'error');
  if (password !== confirm) return msg('auth-msg', 'Passwords do not match', 'error');
  if (password.length < 6) return msg('auth-msg', 'Password must be at least 6 characters', 'error');
  const { error } = await db.auth.signUp({ email, password });
  if (error) msg('auth-msg', error.message, 'error');
  else msg('auth-msg', '✅ Check your email to confirm your account, then log in!', 'success');
}

async function handleSignOut() { await db.auth.signOut(); }

// ── PROFILE ───────────────────────────────────────────────
async function loadProfile() {
  const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  if (data) { currentProfile = data; showScreen('home'); loadHomeScreen(); }
  else showScreen('username');
}

async function handleSetUsername() {
  const raw = v('username-input');
  const username = raw.toLowerCase().replace(/[^a-z0-9_]/g, '');
  if (username.length < 2) return msg('username-msg', 'At least 2 characters (letters/numbers/_)', 'error');
  const { error } = await db.from('profiles').insert({ id: currentUser.id, username });
  if (error) {
    if (error.code === '23505') msg('username-msg', 'That name is taken — try another', 'error');
    else msg('username-msg', error.message, 'error');
  } else { currentProfile = { id: currentUser.id, username }; showScreen('home'); loadHomeScreen(); }
}

// ── HOME ──────────────────────────────────────────────────
async function loadHomeScreen() {
  const today = new Date(), end = new Date(today);
  end.setDate(end.getDate() + 27);
  document.getElementById('create-start').value = fmtDate(today);
  document.getElementById('create-end').value = fmtDate(end);

  const { data: memberships } = await db.from('league_members').select('league_id').eq('user_id', currentUser.id);
  const el = document.getElementById('home-leagues');
  if (!memberships || !memberships.length) { el.innerHTML = ''; return; }

  const ids = memberships.map(m => m.league_id);
  const { data: leagues } = await db.from('leagues').select('*').in('id', ids);
  if (!leagues || !leagues.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="card-title" style="margin-bottom:10px">Your Leagues</div>
    ${leagues.map(l => `
      <div class="league-item" onclick="openLeague('${l.id}')">
        <div>
          <div class="league-item-name">${l.name}</div>
          <div class="league-item-dates">${fmtDisplay(l.game_start)} → ${fmtDisplay(l.game_end)}</div>
        </div>
        <span style="color:var(--muted);font-size:20px">›</span>
      </div>
    `).join('')}`;
}

async function handleCreateLeague() {
  const name = v('create-name'), start = v('create-start'), end = v('create-end');
  if (!name) return msg('create-msg', 'Enter a league name', 'error');
  if (!start || !end) return msg('create-msg', 'Set start and end dates', 'error');
  if (new Date(end) <= new Date(start)) return msg('create-msg', 'End must be after start', 'error');
  const invite_code = genCode();
  const { data: league, error } = await db.from('leagues').insert({ name, invite_code, game_start: start, game_end: end }).select().single();
  if (error) return msg('create-msg', error.message, 'error');
  await db.from('league_members').insert({ league_id: league.id, user_id: currentUser.id, clouds: 4 });
  openLeague(league.id);
}

async function handleJoinLeague() {
  if (!currentUser) return msg('join-msg', 'Not logged in — please refresh the page', 'error');
  const code = v('join-code').toUpperCase();
  if (code.length !== 6) return msg('join-msg', 'Enter the 6-character invite code', 'error');
  try {
    const { data: league } = await db.from('leagues').select('*').eq('invite_code', code).single();
    if (!league) return msg('join-msg', 'League not found — check the code', 'error');
    const { data: existing } = await db.from('league_members').select('id').eq('league_id', league.id).eq('user_id', currentUser.id).single();
    if (existing) { openLeague(league.id); return; }
    const { error } = await db.from('league_members').insert({ league_id: league.id, user_id: currentUser.id, clouds: 4 });
    if (error) return msg('join-msg', error.message, 'error');
    openLeague(league.id);
  } catch (e) {
    msg('join-msg', e.message || 'Something went wrong — please try again', 'error');
  }
}

// ── LEAGUE ────────────────────────────────────────────────
async function openLeague(leagueId) {
  showScreen('league');
  const { data: league } = await db.from('leagues').select('*').eq('id', leagueId).single();
  currentLeague = league;
  document.getElementById('league-title').textContent = league.name;
  const daysLeft = Math.max(0, Math.ceil((new Date(league.game_end) - new Date()) / 86400000));
  document.getElementById('league-days').textContent = daysLeft > 0 ? `${daysLeft}d left` : 'Ended';
  const { data: members } = await db.from('league_members').select('*, profiles(username)').eq('league_id', leagueId);
  currentMembers = members || [];
  setupAdminTab();
  switchTab('leaderboard');
}

function goHome() { currentLeague = null; showScreen('home'); loadHomeScreen(); }

// ── TABS ──────────────────────────────────────────────────
const ADMIN_EMAIL = 'simonjamesgreen@gmail.com';
function isAdmin() { return currentUser?.email === ADMIN_EMAIL; }

function setupAdminTab() {
  const tabsEl = document.getElementById('league-tabs');
  if (isAdmin() && !document.getElementById('admin-tab-btn')) {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.id = 'admin-tab-btn';
    btn.textContent = '⚙️ Admin';
    btn.onclick = () => switchTab('admin');
    tabsEl.appendChild(btn);
  }
}

function switchTab(tab) {
  const tabs = ['leaderboard','submit','powerups','log','info','admin'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
  if (tab === 'leaderboard') renderLeaderboard();
  if (tab === 'submit') renderSubmit();
  if (tab === 'powerups') renderPowerups();
  if (tab === 'log') renderLog();
  if (tab === 'info') renderInfo();
  if (tab === 'admin') renderAdmin();
}

// ── LEADERBOARD ───────────────────────────────────────────
async function renderLeaderboard() {
  const el = document.getElementById('leaderboard-content');
  el.innerHTML = loading();
  const [{ data: entries }, { data: logs }] = await Promise.all([
    db.from('daily_entries').select('*').eq('league_id', currentLeague.id),
    db.from('powerup_logs').select('*').eq('league_id', currentLeague.id)
  ]);
  const board = calcLeaderboard(entries || [], logs || [], currentMembers);
  const today = fmtDate(new Date());

  if (!board.length) { el.innerHTML = empty('📊', 'No entries yet. Be the first to log!'); return; }

  el.innerHTML = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title">Standings</div>

function updatePreview() {
  const actual = parseFloat(document.getElementById('move-actual')?.value);
  const goal = parseFloat(document.getElementById('move-goal-val')?.value);
  const exerciseMins = parseInt(document.getElementById('exercise-mins')?.value) || 0;
  const standHours = parseInt(document.getElementById('stand-hours')?.value) || 0;
  const preview = document.getElementById('score-preview');
  if (!preview) return;
  if (!actual || !goal) { preview.style.display = 'none'; return; }
  preview.style.display = 'block';
  const meetsMinimums = exerciseMins >= 30 && standHours >= 12;
  if (!meetsMinimums) {
    document.getElementById('score-val').textContent = '0%';
    document.getElementById('score-val').className = 'score-big zero';
    document.getElementById('score-note').textContent = 'Minimum: 30 min exercise + 12 hrs stand required';
  } else {
    const s = (actual / goal) * 100;
    document.getElementById('score-val').textContent = `${s.toFixed(1)}%`;
    document.getElementById('score-val').className = `score-big${s >= 100 ? ' good' : ''}`;
    const pct = actual / goal;
    let note = '';
    if (pct >= 3.0) note = '🛡️ 300% — immune to shells today!';
    else if (pct >= 1.5 || exerciseMins >= 90) note = '🎁 Qualifies for a shell!';
    document.getElementById('score-note').textContent = note;
  }
}

async function handleSubmit(entryDate) {
  const moveCalories = parseInt(document.getElementById('move-actual').value);
  const moveGoal = parseInt(document.getElementById('move-goal-val').value);
  const exerciseMins = parseInt(document.getElementById('exercise-mins').value) || 0;
  const standHours = parseInt(document.getElementById('stand-hours').value) || 0;
  if (!moveCalories || !moveGoal) return msg('submit-msg', 'Enter your move calories and goal', 'error');
  const meetsMinimums = exerciseMins >= 30 && standHours >= 12;
  const score = meetsMinimums ? (moveCalories / moveGoal) * 100 : 0;
  const { error } = await db.from('daily_entries').insert({
    league_id: currentLeague.id, user_id: currentUser.id, entry_date: entryDate,
    move_calories: moveCalories, move_goal: moveGoal,
    exercise_mins: exerciseMins, stand_hours: standHours,
    exercise_closed: meetsMinimums, stand_closed: meetsMinimums, score
  });
  if (error) return msg('submit-msg', error.message, 'error');

  const pct = moveCalories / moveGoal;
  const qualifies = (pct >= 1.5 || exerciseMins >= 90) && meetsMinimums;
  if (qualifies) {
    const { data: allEntries } = await db.from('daily_entries').select('*').eq('league_id', currentLeague.id);
    const { data: allLogs } = await db.from('powerup_logs').select('*').eq('league_id', currentLeague.id);
    const board = calcLeaderboard(allEntries || [], allLogs || [], currentMembers);
    const isLastPlace = board.length > 1 && board[board.length - 1].userId === currentUser.id;
    const { data: members } = await db.from('league_members').select('*, profiles(username)').eq('league_id', currentLeague.id);
    currentMembers = members || [];
    const earned = await awardShell(currentUser.id, currentLeague.id, isLastPlace);
    if (earned) {
      msg('submit-msg', `🎁 You earned a ${shellEmoji(earned)} ${earned.replace(/_/g, ' ')}!`, 'success');
      setTimeout(() => renderSubmit(), 3000);
      return;
    }
  }
  renderSubmit();
}

async function awardShell(userId, leagueId, isLastPlace) {
  const member = currentMembers.find(m => m.user_id === userId);
  if (!member) return null;
  const pool = ['mushroom', 'red_shell', 'green_shell', 'blue_shell'];
  if ((member.clouds || 0) < 4) pool.push('cloud');
  if (isLastPlace) pool.push('lightning');
  const shell = pool[Math.floor(Math.random() * pool.length)];
  const dbKey = shellDbKey(shell);
  const { error } = await db.from('league_members').update({ [dbKey]: (member[dbKey] || 0) + 1 })
    .eq('league_id', leagueId).eq('user_id', userId);
  if (error) return null;
  return shell;
}

async function usePowerup(shellKey, targetDate) {
  const member = currentMembers.find(m => m.user_id === currentUser.id);
  const dbKey = shellDbKey(shellKey);
  if (!member || member[dbKey] <= 0) return;

  let targetId = null;
  if (shellKey === 'green_shell') {
    const el = document.getElementById(`tgt-${shellKey}`);
    targetId = el ? el.value : null;
    if (!targetId) return alert('Pick a target for Green Shell');
  }

  const { error: logErr } = await db.from('powerup_logs').insert({
    league_id: currentLeague.id, attacker_id: currentUser.id,
    target_id: targetId, shell_type: shellKey, entry_date: targetDate
  });
  if (logErr) return alert(logErr.message);

  await db.from('league_members').update({ [dbKey]: member[dbKey] - 1 })
    .eq('league_id', currentLeague.id).eq('user_id', currentUser.id);

  const { data: members } = await db.from('league_members').select('*, profiles(username)').eq('league_id', currentLeague.id);
  currentMembers = members || [];
  renderPowerups();
}

async function simulateDay() {
  const date = document.getElementById('test-date')?.value;
  if (!date) return alert('Pick a date first');
  if (!confirm(`Generate random entries for all ${currentMembers.length} players for ${fmtDisplay(date)}?`)) return;

  const results = [];
  for (const m of currentMembers) {
    const move_goal = [400, 500, 600, 700][Math.floor(Math.random() * 4)];
    const move_calories = Math.floor(move_goal * (0.6 + Math.random() * 0.8));
    const exercise_mins = Math.floor(20 + Math.random() * 80);
    const stand_hours = Math.floor(8 + Math.random() * 8);
    const meetsMin = exercise_mins >= 30 && stand_hours >= 12;
    const score = meetsMin ? (move_calories / move_goal) * 100 : 0;

    const { error } = await db.from('daily_entries').upsert({
      league_id: currentLeague.id,
      user_id: m.user_id,
      entry_date: date,
      move_calories, move_goal, exercise_mins, stand_hours,
      exercise_closed: meetsMin, stand_closed: meetsMin, score
    }, { onConflict: 'league_id,user_id,entry_date' });

    results.push(`${m.profiles?.username}: ${score.toFixed(0)}% (ex:${exercise_mins}m st:${stand_hours}h)${error ? ' ❌' : ' ✅'}`);
  }
  alert('Results:\n' + results.join('\n'));
  renderAdmin();
}

async function simulateShell() {
  if (currentMembers.length < 2) return alert('Need at least 2 players to fire shells');
  const date = document.getElementById('test-date')?.value || fmtDate(new Date(Date.now() - 86400000));
  const shells = ['mushroom','red_shell','green_shell','lightning','blue_shell','cloud'];
  const attacker = currentMembers[Math.floor(Math.random() * currentMembers.length)];
  const others = currentMembers.filter(m => m.user_id !== attacker.user_id);
  const target = others[Math.floor(Math.random() * others.length)];
  const shell = shells[Math.floor(Math.random() * shells.length)];
  const dbKey = shellDbKey(shell);

  if (!confirm(`${shellEmoji(shell)} ${attacker.profiles?.username} fires ${shell.replace('_',' ')} at ${target.profiles?.username} for ${fmtDisplay(date)}?`)) return;

  const { error } = await db.from('powerup_logs').insert({
    league_id: currentLeague.id,
    attacker_id: attacker.user_id,
    target_id: shell === 'green_shell' ? target.user_id : null,
    shell_type: shell,
    entry_date: date
  });

  if (error) return alert('Error: ' + error.message);

  if (dbKey && attacker[dbKey] > 0) {
    await db.from('league_members').update({ [dbKey]: attacker[dbKey] - 1 })
      .eq('league_id', currentLeague.id).eq('user_id', attacker.user_id);
  }

  const { data: members } = await db.from('league_members').select('*, profiles(username)').eq('league_id', currentLeague.id);
  currentMembers = members || [];
  alert(`✅ Shell fired!`);
  renderAdmin();
}

            <div>${shellEmoji(log.shell_type)} <strong>${uname(log.attacker_id)}</strong>${log.target_id ? ` → ${uname(log.target_id)}` : ''}</div>
            <div class="log-date">${fmtDisplay(log.entry_date)} · ${relTime(log.created_at)}</div>
          </div>
          <button class="btn btn-sm" style="background:var(--pink);color:white;width:auto" onclick="deletePowerup('${log.id}')">Delete</button>
        </div>`).join('')}
    </div>`;
}

async function saveInventory(userId) {
  const keys = ['mushrooms','red_shells','green_shells','lightnings','blue_shells','clouds'];
  const update = {};
  for (const key of keys) {
    const val = parseInt(document.getElementById(`inv-${userId}-${key}`)?.value);
    if (!isNaN(val)) update[key] = val;
  }
  const { error } = await db.from('league_members').update(update)
    .eq('league_id', currentLeague.id).eq('user_id', userId);
  if (error) return alert('Error: ' + error.message);
  const { data: members } = await db.from('league_members').select('*, profiles(username)').eq('league_id', currentLeague.id);
  currentMembers = members || [];
  alert('✅ Inventory saved!');
}

async function saveEntry(entryId) {
  const calories = parseInt(document.getElementById(`e-cal-${entryId}`)?.value);
  const goal = parseInt(document.getElementById(`e-goal-${entryId}`)?.value);
  const exercise_mins = parseInt(document.getElementById(`e-exmins-${entryId}`)?.value) || 0;
  const stand_hours = parseInt(document.getElementById(`e-sthrs-${entryId}`)?.value) || 0;
  const score = parseFloat(document.getElementById(`e-score-${entryId}`)?.value);
  const exercise_closed = exercise_mins >= 30;
  const stand_closed = stand_hours >= 12;
  const { error } = await db.from('daily_entries').update({ move_calories: calories, move_goal: goal, exercise_mins, stand_hours, exercise_closed, stand_closed, score }).eq('id', entryId);
  if (error) return alert('Error: ' + error.message);
  alert('✅ Entry saved!');
}

async function deletePowerup(logId) {
  if (!confirm('Delete this attack? This will restore the shell to the player.')) return;
  const { data: log } = await db.from('powerup_logs').select('*').eq('id', logId).single();
  if (!log) return;
  const dbKey = shellDbKey(log.shell_type);
  const member = currentMembers.find(m => m.user_id === log.attacker_id);
  await db.from('powerup_logs').delete().eq('id', logId);
  if (member && dbKey) {
    await db.from('league_members').update({ [dbKey]: (member[dbKey] || 0) + 1 })
      .eq('league_id', currentLeague.id).eq('user_id', log.attacker_id);
  }
  const { data: members } = await db.from('league_members').select('*, profiles(username)').eq('league_id', currentLeague.id);
  currentMembers = members || [];
  renderAdmin();
}

// ── SCORING ENGINE ────────────────────────────────────────
function calcLeaderboard(entries, logs, members) {
  const byDate = {}, entriesByDate = {};
  for (const e of entries) {
    if (!byDate[e.entry_date]) { byDate[e.entry_date] = {}; entriesByDate[e.entry_date] = []; }
    byDate[e.entry_date][e.user_id] = e.score;
    entriesByDate[e.entry_date].push(e);
  }
  const finalByDate = {};
  for (const [date, scores] of Object.entries(byDate)) {
    finalByDate[date] = applyPowerups({ ...scores }, logs.filter(l => l.entry_date === date), entriesByDate[date] || []);
  }
  const totals = {};
  for (const m of members) totals[m.user_id] = { totalScore: 0, daysPlayed: 0, avgScore: 0, dailyScores: {}, username: m.profiles?.username || 'Unknown' };
  for (const [date, scores] of Object.entries(finalByDate)) {
    for (const [uid, score] of Object.entries(scores)) {
      if (totals[uid]) { totals[uid].totalScore += score; totals[uid].daysPlayed += 1; totals[uid].dailyScores[date] = score; }
    }
  }
  for (const p of Object.values(totals)) p.avgScore = p.daysPlayed > 0 ? p.totalScore / p.daysPlayed : 0;
  return Object.entries(totals).map(([userId, d]) => ({ userId, ...d })).sort((a, b) => b.avgScore - a.avgScore);
}

function applyPowerups(scores, logs, entries) {
  // 300% move = immune to incoming shells
  const immune = new Set();
  for (const e of entries) {
    if (e.move_goal > 0 && e.move_calories / e.move_goal >= 3.0) immune.add(e.user_id);
  }
  // Each player can only be impacted by one incoming shell per day (first fired wins)
  const impacted = new Set();
  // Process in chronological order
  const sorted = [...logs].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  for (const p of sorted) {
    const attacker = p.attacker_id;
    if (p.shell_type === 'mushroom') {
      if (scores[attacker] !== undefined) scores[attacker] *= 2;
    } else if (p.shell_type === 'cloud') {
      scores[attacker] = 100;
    } else if (p.shell_type === 'blue_shell') {
      const otherScores = Object.entries(scores).filter(([uid]) => uid !== attacker).map(([, s]) => s);
      if (otherScores.length) scores[attacker] = Math.max(...otherScores);
    } else if (p.shell_type === 'lightning') {
      if (scores[attacker] !== undefined) scores[attacker] *= 2;
      for (const uid of Object.keys(scores)) {
        if (uid !== attacker && !impacted.has(uid) && !immune.has(uid)) {
          scores[uid] *= 0.5; impacted.add(uid);
        }
      }
    } else if (p.shell_type === 'red_shell') {
      const leader = Object.entries(scores).filter(([uid]) => uid !== attacker).sort(([, a], [, b]) => b - a)[0];
      if (leader) {
        const [targetId] = leader;
        if (!impacted.has(targetId) && !immune.has(targetId)) { scores[targetId] *= 0.5; impacted.add(targetId); }
      }
    } else if (p.shell_type === 'green_shell') {
      const targetId = p.target_id;
      if (targetId && scores[targetId] !== undefined && !impacted.has(targetId) && !immune.has(targetId)) {
        scores[targetId] *= 0.5; impacted.add(targetId);
      }
    }
  }
  return scores;
}

// ── HELPERS ───────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0, 0);
}
function msg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
  if (type === 'error') setTimeout(() => { el.innerHTML = ''; }, 5000);
}
function v(id) { return document.getElementById(id)?.value?.trim() || ''; }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDisplay(s) { return new Date(s + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }
function relTime(iso) { const m = Math.floor((Date.now()-new Date(iso))/60000); if(m<1) return 'just now'; if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; return `${Math.floor(h/24)}d ago`; }
function genCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function shellEmoji(t) { return {mushroom:'🍄',red_shell:'🔴',green_shell:'🟢',lightning:'⚡',blue_shell:'🔵',cloud:'☁️'}[t]||'❓'; }
function shellDbKey(t) { return {mushroom:'mushrooms',red_shell:'red_shells',green_shell:'green_shells',lightning:'lightnings',blue_shell:'blue_shells',cloud:'clouds'}[t]; }
function loading() { return '<div class="loading"><div class="spinner"></div></div>'; }
function empty(icon, text) { return `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${text}</p></div>`; }

init();
</script>
